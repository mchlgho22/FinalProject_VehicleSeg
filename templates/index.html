<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vehicle Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#1c1c1c;
    padding:20px;
}

.menu a{
    display:block;
    padding:12px;
    margin-bottom:10px;
    background:#2a2a2a;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.menu a:hover{
    background:#00d4ff;
    color:black;
}

/* CONTENT */
.content{
    flex:1;
    padding:20px;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>MENU</h2>

        <div class="menu">
            <a href="/upload">📤 Upload</a>
            <a href="/live">📺 Live</a>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        {% if page == "home" %}

            <h1>Dashboard Home</h1>
            <!-- <p>Silakan pilih menu Upload atau Live</p> -->

        {% elif page == "upload" %}

            {% include "upload.html" %}

        {% elif page == "live" %}

            {% include "live.html" %}

        {% endif %}

    </div>

</div>

</body>
</html>
